[package]
name = "quadtree"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]

[dependencies]
bincode = "2.0.1"
clap = { version = "4.4", features = ["derive"] }
csv = "1.3"
flate2 = "1.0"
hdf5 = { package = "hdf5-metno", version = "0.10.0" }
ndarray = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
sux = "0.7.4"
cseq = "0.1.4"
bitm = "0.5.1"
